# ── nginx.conf ───────────────────────────────────────────────────────────────
# Place this file at: make_your_own_adv/frontend/nginx.conf
# BACKEND_URL should be set to your Choreo backend service's internal URL
# e.g. http://make-your-own-adv-backend:8000
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 8080;

    root /usr/share/nginx/html;
    index index.html;

    # React Router: serve index.html for all unmatched routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend service
    # Replace the proxy_pass value with your Choreo internal service URL
    location /api {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}